<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>紐西蘭南島 14 天行程</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;900&family=Noto+Serif+TC:wght@700;900&display=swap" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="progress-bar" id="pbar"></div>

    <section class="hero">
      <h1 class="hero-title">紐西蘭南島</h1>
      <p class="hero-sub">2026.03.28 – 04.10</p>

      <div class="route-map">
        <picture>
          <source srcset="img/route-map.webp" type="image/webp" />
          <img
            src="img/route-map.png"
            alt="紐西蘭南島自駕路線圖"
            fetchpriority="high"
          />
        </picture>
      </div>

      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-num" data-target="1335">0</div>
          <div class="stat-label">公里</div>
        </div>
        <div class="stat-div"></div>
        <div class="stat-item">
          <div class="stat-num" data-target="14">0</div>
          <div class="stat-label">天</div>
        </div>
        <div class="stat-div"></div>
        <div class="stat-item">
          <div class="stat-num" data-target="8">0</div>
          <div class="stat-label">城市</div>
        </div>
      </div>
    </section>

    <nav class="nav-wrap" id="navW">
      <button class="nav-tab active">序</button>
      <button class="nav-tab">西海岸</button>
      <button class="nav-tab">皇后鎮</button>
      <button class="nav-tab">山湖</button>
      <button class="nav-tab">歸</button>
      <div class="nav-ind" id="navInd"></div>
    </nav>

    <main id="main"></main>

    <footer class="ftr">
      <div class="note-box">
        <h4>📌 出發前提醒</h4>
        <ul>
          <li>護照效期需超過 2026/10/10</li>
          <li>NZeTA 電子旅行授權：已完成（綁護照）</li>
          <li>NZTD 旅客聲明：出發前 24hr 內填寫</li>
          <li>南島天氣多變，帶防水外套、洋蔥式穿搭</li>
          <li>紐西蘭靠左行駛（右駕），圓環讓右方來車</li>
        </ul>
      </div>
      <div class="legend">
        <span class="tag tag-n">自然景觀</span>
        <span class="tag tag-a">活動體驗</span>
        <span class="tag tag-f">美食推薦</span>
        <span class="tag tag-c">人文歷史</span>
        <span class="tag tag-s">星空觀測</span>
      </div>
      <div class="ftr-txt">
        南島逆時針環狀路線<br />Christchurch 出發 & 回程
      </div>
    </footer>

    <button class="btt" id="btt" aria-label="回到頂部">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M18 15l-6-6-6 6" />
      </svg>
    </button>

    <script>
    (function () {
      var KEY = "nz-trip-ver";

      function fetchVersion(cb) {
        fetch("version.json?_=" + Date.now(), { cache: "no-store" })
          .then(function (r) { return r.json(); })
          .then(function (d) { cb(d.v); })
          .catch(function () { cb(null); });
      }

      function loadScript(ver) {
        var q = ver ? "?v=" + ver : "";
        // Cache-bust CSS
        var css = document.querySelector('link[href*="style.css"]');
        if (css) css.href = "css/style.css" + q;
        // Load JS with version
        var s = document.createElement("script");
        s.src = "js/main.js" + q;
        document.body.appendChild(s);
      }

      // Initial load: fetch version → load resources
      fetchVersion(function (ver) {
        if (ver) sessionStorage.setItem(KEY, ver);
        loadScript(ver);
      });

      // Auto-reload when tab becomes visible and version has changed
      document.addEventListener("visibilitychange", function () {
        if (document.visibilityState !== "visible") return;
        fetchVersion(function (ver) {
          if (!ver) return;
          var prev = sessionStorage.getItem(KEY);
          if (prev && prev !== ver) {
            sessionStorage.setItem(KEY, ver);
            window.location.reload();
          }
        });
      });
    })();
    </script>
  </body>
</html>
